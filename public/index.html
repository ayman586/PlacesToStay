<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>PlacesToStay</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      padding: 20px;
    }

    input {
      width: 70%;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #2980b9;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .book-btn {
      margin-top: 10px;
      background: #27ae60;
    }

    .book-btn:hover {
      background: #1e8449;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>🏨 PlacesToStay</h1>
    <p>Find and book accommodation easily</p>
  </div>

  <div class="container">

    <input id="locationInput" placeholder="Enter location (e.g. London)" />
    <button onclick="search()">Search</button>

    <div id="results"></div>

  </div>

<script src="frontend.js"></script>

</body>
</html>
